name: CI

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Generate test report
        uses: dorny/test-reporter@v1
        with:
          reporter: google-java-format
          fail-on: failed-tests 

      - name: Run unit tests
        run: mvn test --batch-mode

      - name: Run integration tests
        run: mvn integration-test --batch-mode

      - name: Upload unit tests report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: target/surefire-reports/*.xml
          retention-days: 7

      - name: Upload integration tests report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: target/failsafe-reports/*.xml
          retention-days: 7
