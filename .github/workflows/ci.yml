name: CI - Single Job

# Se ejecuta cuando se hace un push o una pull request al repositorio.
on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # X1 | Antes habrá que darle permisos de escritura con chmod.
      - name: Dar permisos de ejecución al wrapper de Maven
        run: chmod +x mvnw

      # Compile el proyecto Spring Boot Maven proporcionado. (./mvnw compile --no-transfer-progress)
      - name: Compile code
        run: ./mvnw compile --no-transfer-progress

      - name: Run unit tests
        run: ./mvnw test --no-transfer-progress
        continue-on-error: true

      # Ejecute los tests de integración (./mvnw verify --no-transfer-progress) | X1
      - name: Run integration tests
        run: ./mvnw verify --no-transfer-progress
        continue-on-error: true

      # Convertir XML a JSON para que github-test-reporter lo entienda
      - name: Convert Surefire & Failsafe to CTRF JSON
        if: always()
        run: |
          npx junit-to-ctrf target/surefire-reports/TEST-*.xml -o ctrf/surefire-report.json
          npx junit-to-ctrf target/failsafe-reports/TEST-*.xml -o ctrf/failsafe-report.json

      # Genere un informe de resultados. Para ello puedes tener en cuenta el workflow disponible de GitHub-test-reporter.
      - name: Generación de informe de resultados(github-test-reporter)
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: './ctrf/*.json'
          github-report: true
        if: always()

      # Generador del badge de cobertura de Jacoco
      - name: Generate Jacoco Badge
        uses: cicirello/jacoco-badge-generator@v2
        if : always()
        with:
          generate-branches-badge: true
          jacoco-csv-file: target/site/jacoco/jacoco.csv

      # Hacer commit de los badges de Jacoco para que se muestren en el README
      - name: Commit and push badges
        if: ${{ always() && github.event_name == 'push' }}
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/badges/
          git commit -m "Autogenerated JaCoCo coverage badges" || echo "No changes to commit"
          git push

      - name: Upload unit tests report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: target/surefire-reports/*.xml
          retention-days: 7

      - name: Upload integration tests report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: target/failsafe-reports/*.xml
          retention-days: 7
